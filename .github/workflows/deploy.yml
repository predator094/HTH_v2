name: Deploy HTH

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.196.35
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/scripts/HTH_v2
            git pull origin master
            docker compose build --no-cache
            docker compose up -d --remove-orphans
