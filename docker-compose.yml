services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_SITE_PASSCODE=${NEXT_PUBLIC_SITE_PASSCODE}
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      backend:
        condition: service_started

