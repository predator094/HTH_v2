server {
    listen 80;
    server_name h2h.pred8ar.in;

    # Redirect to HTTPS (handled by Certbot / existing Nginx SSL config)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name h2h.pred8ar.in;

    # SSL certificates — managed by Certbot, paths match existing setup
    ssl_certificate     /etc/letsencrypt/live/h2h.pred8ar.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/h2h.pred8ar.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Real IP from Cloudflare / reverse proxy
    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    client_max_body_size 1m;  # uploads go direct to R2, only JSON/metadata hits backend

    # Backend API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Next.js frontend
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
